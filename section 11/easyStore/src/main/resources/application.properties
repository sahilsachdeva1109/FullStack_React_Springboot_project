spring.application.name=easyStore

#logging
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
logging.level.root=${LOG_LEVEL:INFO}
logging.file.name=${LOG_FILE_NAME:/Users/sahil/Desktop/Sahil/Workspace/FullStack-react-Springboot/logs/app.log}
logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}

spring.datasource.url=jdbc:mysql://localhost:3306/easystore
spring.datasource.username=root
spring.datasource.password=${DATABASE_PASSWORD:Batman@110902}

#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Tell Hibernate explicitly which dialect to use:
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# OR (alternate property)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

