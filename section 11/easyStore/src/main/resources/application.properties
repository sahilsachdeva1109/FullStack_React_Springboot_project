management.endpoint.health.show-details = always
management.endpoints.web.exposure.include=*
management.endpoint.configprops.show-values=always
management.endpoint.env.show-values=always

management.info.env.enabled=true
info.app-name=${spring.application.name}
info.app.description=Backend Project for Easy Store e-commerce application 
info.app.version= 1.0.0
info.app.contact.email=sahil@example.com

spring.security.user.name = ${EASYSTORE_USERNAME:sahil}
spring.security.user.password = ${EASYSTORE_PASSWORD:root}
spring.security.user.roles = ${EASYSTORE_ROLES: USER,ADMIN}
