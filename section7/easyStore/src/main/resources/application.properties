spring.application.name=easyStore
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n

spring.h2.console.enabled=true
spring.datasource.url=jdbc:mysql://localhost:3306/easystore
spring.datasource.username=root
spring.datasource.password=${DATABASE_PASSWORD:Batman@110902}

#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Tell Hibernate explicitly which dialect to use:
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# OR (alternate property)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

